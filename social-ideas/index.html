<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cima Ideas</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cima Ideas">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a2f5e">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a2f5e;
  --navy-deep: #0f1e3d;
  --blue-mid: #2b5299;
  --blue-sky: #4a90d9;
  --blue-light: #7ab8f5;
  --blue-pale: #dceefb;
  --gold: #c9a84c;
  --gold-light: #f0d98a;
  --white: #ffffff;
  --off-white: #f5f8fd;
  --gray-text: #4a5568;
  --gray-light: #e8edf5;
  --gray-mid: #a0aec0;
  --success: #38a169;
  --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  --fb-blue: #1877f2;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--off-white);
  color: var(--navy-deep);
  overscroll-behavior: none;
}

/* ── HEADER ── */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--navy-deep);
  padding: calc(var(--safe-top) + 12px) 20px 0;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-icon {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--blue-sky), var(--blue-mid));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.header-text h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  color: var(--white);
  line-height: 1.1;
}

.header-text p {
  font-size: 0.68rem;
  color: var(--blue-light);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 500;
  margin-top: 1px;
}

/* Language Toggle */
.lang-toggle {
  display: flex;
  background: rgba(255,255,255,0.12);
  border-radius: 100px;
  padding: 3px;
  gap: 2px;
}

.lang-btn {
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-family: 'DM Sans', sans-serif;
}

.lang-btn.active {
  background: var(--blue-sky);
  color: var(--white);
  box-shadow: 0 2px 8px rgba(74,144,217,0.5);
}

/* Platform tabs */
.platform-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.platform-tab {
  flex: 1;
  padding: 8px 6px;
  border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}

.platform-tab.active-all {
  background: rgba(255,255,255,0.15);
  color: var(--white);
  border-color: rgba(255,255,255,0.3);
}

.platform-tab.active-ig {
  background: rgba(220,39,67,0.25);
  color: #ff8fa3;
  border-color: rgba(220,39,67,0.5);
}

.platform-tab.active-fb {
  background: rgba(24,119,242,0.25);
  color: #74aaff;
  border-color: rgba(24,119,242,0.5);
}

/* Category chips */
.categories-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 14px;
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.categories-scroll::-webkit-scrollbar { display: none; }

.cat-chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 100px;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.76rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.cat-chip.active {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--navy-deep);
}

/* ── MAIN CONTENT ── */
.main {
  padding: 16px 16px calc(var(--safe-bottom) + 90px);
}

/* Stats bar */
.stats-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding: 0 2px;
}

.stats-count {
  font-size: 0.8rem;
  color: var(--gray-text);
  font-weight: 500;
}

.stats-count span {
  font-weight: 700;
  color: var(--blue-sky);
}

.btn-shuffle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--navy);
  color: var(--white);
  border: none;
  border-radius: 100px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 10px rgba(26,47,94,0.25);
}

.btn-shuffle:active {
  transform: scale(0.95);
  background: var(--blue-mid);
}

/* Idea Cards */
.ideas-grid {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.idea-card {
  background: var(--white);
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 2px 16px rgba(26,47,94,0.08);
  border: 1px solid var(--gray-light);
  transition: transform 0.15s, box-shadow 0.15s;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.idea-card:active {
  transform: scale(0.985);
}

/* Card top row */
.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}

.card-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex: 1;
}

.badge {
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.badge-cat {
  background: var(--blue-pale);
  color: var(--blue-mid);
}

.badge-type {
  background: #fef9ec;
  color: #92640a;
  border: 1px solid #f0d98a;
}

.badge-ig {
  background: linear-gradient(45deg, #f09433, #dc2743);
  color: white;
}

.badge-fb {
  background: #1877f2;
  color: white;
}

.badge-both {
  background: linear-gradient(90deg, #dc2743 40%, #1877f2 60%);
  color: white;
}

/* Favorite btn */
.btn-fav {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.2rem;
  line-height: 1;
  padding: 2px;
  transition: transform 0.15s;
  flex-shrink: 0;
}

.btn-fav:active { transform: scale(1.3); }

/* Card title */
.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  color: var(--navy);
  line-height: 1.3;
  margin-bottom: 10px;
  font-weight: 700;
}

/* Post idea */
.card-idea {
  background: var(--off-white);
  border-radius: 12px;
  padding: 13px 15px;
  margin-bottom: 12px;
  border-left: 3px solid var(--blue-sky);
}

.card-idea p {
  font-size: 0.88rem;
  line-height: 1.6;
  color: var(--gray-text);
}

/* Hashtags */
.card-hashtags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}

.hashtag {
  font-size: 0.73rem;
  color: var(--blue-sky);
  font-weight: 600;
}

/* Card actions */
.card-actions {
  display: flex;
  gap: 8px;
}

.btn-copy {
  flex: 1;
  padding: 10px;
  background: var(--navy);
  color: var(--white);
  border: none;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-copy:active { background: var(--blue-mid); transform: scale(0.97); }
.btn-copy.copied { background: var(--success); }

.btn-copy-title {
  flex: 1;
  padding: 10px;
  background: var(--off-white);
  color: var(--navy);
  border: 1.5px solid var(--gray-light);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-copy-title:active { background: var(--gray-light); transform: scale(0.97); }

/* ── FAB (Floating Action Bar) ── */
.fab-bar {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 16px);
  left: 16px;
  right: 16px;
  background: var(--navy-deep);
  border-radius: 18px;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 8px 32px rgba(15,30,61,0.45);
  z-index: 50;
}

.fab-favorites {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--gold);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 100px;
  border: 1.5px solid rgba(201,168,76,0.4);
  background: rgba(201,168,76,0.08);
  transition: all 0.2s;
}

.fab-random {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 22px;
  background: var(--blue-sky);
  color: var(--white);
  border: none;
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(74,144,217,0.4);
}

.fab-random:active { transform: scale(0.95); background: var(--blue-mid); }

/* ── FAVORITES VIEW ── */
.view-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,30,61,0.7);
  z-index: 200;
  display: none;
  align-items: flex-end;
}

.view-overlay.open { display: flex; }

.favorites-sheet {
  background: var(--white);
  width: 100%;
  max-height: 80vh;
  border-radius: 24px 24px 0 0;
  display: flex;
  flex-direction: column;
  padding-bottom: calc(var(--safe-bottom) + 20px);
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.sheet-handle {
  width: 40px;
  height: 4px;
  background: var(--gray-light);
  border-radius: 2px;
  margin: 12px auto 0;
}

.sheet-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--gray-light);
}

.sheet-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  color: var(--navy);
}

.sheet-close {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--gray-light);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  color: var(--gray-text);
}

.sheet-body {
  overflow-y: auto;
  padding: 16px 20px;
  flex: 1;
}

.empty-favorites {
  text-align: center;
  padding: 40px 20px;
  color: var(--gray-mid);
}

.empty-favorites .emoji { font-size: 2.5rem; margin-bottom: 10px; }
.empty-favorites p { font-size: 0.9rem; line-height: 1.5; }

/* ── SPOTLIGHT (Random Pick) ── */
.spotlight-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,30,61,0.85);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.spotlight-overlay.open { display: flex; }

.spotlight-card {
  background: var(--white);
  border-radius: 24px;
  width: 100%;
  max-width: 420px;
  overflow: hidden;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}

.spotlight-header {
  background: linear-gradient(135deg, var(--navy-deep), var(--blue-mid));
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.spotlight-label {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold);
}

.spotlight-close {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
}

.spotlight-body {
  padding: 20px;
}

.spotlight-next {
  width: 100%;
  margin-top: 14px;
  padding: 13px;
  background: var(--blue-sky);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.spotlight-next:active { background: var(--blue-mid); transform: scale(0.97); }

/* ── INSTALL BANNER ── */
.install-banner {
  margin: 0 16px 14px;
  background: linear-gradient(135deg, var(--gold), #b8940d);
  border-radius: 14px;
  padding: 13px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.install-banner-text {
  flex: 1;
}

.install-banner-text strong {
  display: block;
  font-size: 0.84rem;
  color: var(--navy-deep);
  font-weight: 700;
  margin-bottom: 2px;
}

.install-banner-text small {
  font-size: 0.73rem;
  color: rgba(15,30,61,0.7);
  line-height: 1.4;
}

.install-banner-dismiss {
  background: none;
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
  padding: 4px;
  color: rgba(15,30,61,0.6);
}

/* No results */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--gray-mid);
}

.no-results .emoji { font-size: 3rem; margin-bottom: 12px; }
.no-results h3 { font-size: 1rem; color: var(--navy); margin-bottom: 6px; }
.no-results p { font-size: 0.85rem; line-height: 1.5; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-top">
    <div class="header-brand">
      <div class="header-icon">💡</div>
      <div class="header-text">
        <h1>Cima Ideas</h1>
        <p>Social Media Generator</p>
      </div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="es" onclick="setLang('es')">ES</button>
    </div>
  </div>

  <!-- Platform tabs -->
  <div class="platform-tabs">
    <button class="platform-tab active-all" data-platform="all" onclick="setPlatform('all')">
      🌐 <span data-en="All" data-es="Todo">All</span>
    </button>
    <button class="platform-tab" data-platform="instagram" onclick="setPlatform('instagram')">
      📸 Instagram
    </button>
    <button class="platform-tab" data-platform="facebook" onclick="setPlatform('facebook')">
      👍 Facebook
    </button>
  </div>

  <!-- Category chips -->
  <div class="categories-scroll">
    <button class="cat-chip active" data-cat="all" onclick="setCat('all')">
      <span data-en="✨ All Topics" data-es="✨ Todo">✨ All Topics</span>
    </button>
    <button class="cat-chip" data-cat="tax" onclick="setCat('tax')">
      <span data-en="🧾 Tax Tips" data-es="🧾 Impuestos">🧾 Tax Tips</span>
    </button>
    <button class="cat-chip" data-cat="bookkeeping" onclick="setCat('bookkeeping')">
      <span data-en="📊 Bookkeeping" data-es="📊 Contabilidad">📊 Bookkeeping</span>
    </button>
    <button class="cat-chip" data-cat="payroll" onclick="setCat('payroll')">
      <span data-en="💼 Payroll" data-es="💼 Nómina">💼 Payroll</span>
    </button>
    <button class="cat-chip" data-cat="business" onclick="setCat('business')">
      <span data-en="🏢 Business" data-es="🏢 Negocios">🏢 Business</span>
    </button>
    <button class="cat-chip" data-cat="itin" onclick="setCat('itin')">
      <span data-en="🪪 ITIN" data-es="🪪 ITIN">🪪 ITIN</span>
    </button>
    <button class="cat-chip" data-cat="salestax" onclick="setCat('salestax')">
      <span data-en="🏪 Sales Tax" data-es="🏪 Sales Tax">🏪 Sales Tax</span>
    </button>
    <button class="cat-chip" data-cat="community" onclick="setCat('community')">
      <span data-en="❤️ Community" data-es="❤️ Comunidad">❤️ Community</span>
    </button>
  </div>
</header>

<!-- MAIN -->
<main class="main">
  <!-- Install banner (shown once) -->
  <div class="install-banner" id="installBanner" style="display:none;">
    <span style="font-size:1.4rem;">📱</span>
    <div class="install-banner-text">
      <strong data-en="Add to Home Screen" data-es="Añadir al inicio">Add to Home Screen</strong>
      <small data-en="Tap the Share button → 'Add to Home Screen' for app-like access" data-es="Toca Compartir → 'Añadir a inicio' para acceso rápido">Tap the Share button → 'Add to Home Screen' for app-like access</small>
    </div>
    <button class="install-banner-dismiss" onclick="dismissInstall()">✕</button>
  </div>

  <!-- Stats + shuffle -->
  <div class="stats-bar">
    <p class="stats-count">
      <span id="visibleCount">0</span> <span data-en="ideas" data-es="ideas">ideas</span>
    </p>
    <button class="btn-shuffle" onclick="shuffleOrder()">
      🔀 <span data-en="Shuffle" data-es="Mezclar">Shuffle</span>
    </button>
  </div>

  <!-- Cards container -->
  <div class="ideas-grid" id="cardsGrid"></div>
</main>

<!-- FAB BAR -->
<div class="fab-bar">
  <button class="fab-favorites" onclick="openFavorites()">
    ⭐ <span id="favCount">0</span> <span data-en="Saved" data-es="Guardadas">Saved</span>
  </button>
  <button class="fab-random" onclick="openRandom()">
    🎲 <span data-en="Random Idea" data-es="Idea Aleatoria">Random Idea</span>
  </button>
</div>

<!-- FAVORITES SHEET -->
<div class="view-overlay" id="favOverlay" onclick="closeFavorites(event)">
  <div class="favorites-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>⭐ <span data-en="Saved Ideas" data-es="Ideas Guardadas">Saved Ideas</span></h2>
      <button class="sheet-close" onclick="closeFavorites()">✕</button>
    </div>
    <div class="sheet-body" id="favBody"></div>
  </div>
</div>

<!-- SPOTLIGHT (Random) -->
<div class="spotlight-overlay" id="spotlightOverlay" onclick="closeSpotlight(event)">
  <div class="spotlight-card" id="spotlightCard">
    <div class="spotlight-header">
      <span class="spotlight-label" data-en="🎲 Random Idea" data-es="🎲 Idea Aleatoria">🎲 Random Idea</span>
      <button class="spotlight-close" onclick="closeSpotlight()">✕</button>
    </div>
    <div class="spotlight-body" id="spotlightBody"></div>
    <div style="padding: 0 20px 20px;">
      <button class="spotlight-next" onclick="openRandom()">
        <span data-en="🎲 Another Random Idea" data-es="🎲 Otra Idea Aleatoria">🎲 Another Random Idea</span>
      </button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let currentLang = 'en';
let currentPlatform = 'all';
let currentCat = 'all';
let favorites = JSON.parse(localStorage.getItem('cima-favs') || '[]');
let currentOrder = null;

// ── DATA ──
const ideas = [
  // ─── TAX TIPS ───
  {
    id: 1, cat: 'tax', platforms: ['instagram', 'facebook'], type: 'tip',
    title: { en: '5 Deductions Small Business Owners Miss', es: '5 Deducciones que los Dueños de Negocios Ignoran' },
    idea: {

// ── RENDER ──
function getFiltered() {
  let filtered = ideas;

  if (currentPlatform !== 'all') {
    filtered = filtered.filter(i => i.platforms.includes(currentPlatform));
  }

  if (currentCat !== 'all') {
    filtered = filtered.filter(i => i.cat === currentCat);
  }

  if (currentOrder) {
    filtered = [...filtered].sort((a, b) => currentOrder.indexOf(a.id) - currentOrder.indexOf(b.id));
  }

  return filtered;
}

function getPlatformBadge(platforms) {
  const both = platforms.includes('instagram') && platforms.includes('facebook');
  const ig = platforms.includes('instagram') && !platforms.includes('facebook');
  const fb = platforms.includes('facebook') && !platforms.includes('instagram');
  if (both) return '<span class="badge badge-both">📸👍 Both</span>';
  if (ig) return '<span class="badge badge-ig">📸 Instagram</span>';
  if (fb) return '<span class="badge badge-fb">👍 Facebook</span>';
  return '';
}

function getCatLabel(cat) {
  const cats = {
    tax: { en: '🧾 Tax Tips', es: '🧾 Impuestos' },
    bookkeeping: { en: '📊 Bookkeeping', es: '📊 Contabilidad' },
    payroll: { en: '💼 Payroll', es: '💼 Nómina' },
    business: { en: '🏢 Business', es: '🏢 Negocios' },
    itin: { en: '🪪 ITIN', es: '🪪 ITIN' },
    salestax: { en: '🏪 Sales Tax', es: '🏪 Sales Tax' },
    community: { en: '❤️ Community', es: '❤️ Comunidad' }
  };
  return cats[cat]?.[currentLang] || cat;
}

function getTypeLabel(type) {
  const types = {
    tip: { en: '💡 Tip', es: '💡 Consejo' },
    educational: { en: '📚 Educational', es: '📚 Educativo' },
    question: { en: '❓ Question', es: '❓ Pregunta' },
    story: { en: '📖 Story', es: '📖 Historia' },
    motivational: { en: '🌟 Motivational', es: '🌟 Motivacional' },
    seasonal: { en: '📅 Seasonal', es: '📅 Estacional' }
  };
  return types[type]?.[currentLang] || type;
}

function isFav(id) {
  return favorites.includes(id);
}

function renderCard(idea, mini = false) {
  const fav = isFav(idea.id);
  const hashtags = idea.hashtags[currentLang].map(h => `<span class="hashtag">${h}</span>`).join('');
  const text = idea.idea[currentLang];
  const title = idea.title[currentLang];

  if (mini) {
    return `
      <div class="idea-card" style="margin-bottom:12px;">
        <div class="card-badges" style="margin-bottom:10px;">
          <span class="badge badge-cat">${getCatLabel(idea.cat)}</span>
          ${getPlatformBadge(idea.platforms)}
        </div>
        <div class="card-title" style="font-size:0.95rem;">${title}</div>
        <div class="card-idea"><p>${text.replace(/\n/g, '<br>')}</p></div>
        <div class="card-hashtags">${hashtags}</div>
        <button class="btn-copy" onclick="copyIdea(${idea.id}, 'full-mini-${idea.id}', this)">
          📋 <span data-en="Copy Post" data-es="Copiar">Copy Post</span>
        </button>
      </div>`;
  }

  return `
    <div class="idea-card" id="card-${idea.id}">
      <div class="card-top">
        <div class="card-badges">
          <span class="badge badge-cat">${getCatLabel(idea.cat)}</span>
          <span class="badge badge-type">${getTypeLabel(idea.type)}</span>
          ${getPlatformBadge(idea.platforms)}
        </div>
        <button class="btn-fav" onclick="toggleFav(${idea.id})" aria-label="Save">
          ${fav ? '⭐' : '☆'}
        </button>
      </div>
      <div class="card-title">${title}</div>
      <div class="card-idea">
        <p>${text.replace(/\n/g, '<br>')}</p>
      </div>
      <div class="card-hashtags">${hashtags}</div>
      <div class="card-actions">
        <button class="btn-copy-title" onclick="copyText('${encodeTitle(title)}', this)">
          📌 <span data-en="Copy Title" data-es="Copiar Título">Copy Title</span>
        </button>
        <button class="btn-copy" id="copybtn-${idea.id}" onclick="copyIdea(${idea.id}, 'copybtn-${idea.id}', this)">
          📋 <span data-en="Copy Post" data-es="Copiar Publicación">Copy Post</span>
        </button>
      </div>
    </div>`;
}

function encodeTitle(title) {
  return title.replace(/'/g, "\\'").replace(/"/g, '\\"');
}

function renderCards() {
  const filtered = getFiltered();
  const grid = document.getElementById('cardsGrid');
  document.getElementById('visibleCount').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="no-results">
        <div class="emoji">🔍</div>
        <h3>${currentLang === 'en' ? 'No ideas found' : 'No hay ideas'}</h3>
        <p>${currentLang === 'en' ? 'Try a different category or platform filter.' : 'Prueba una categoría o plataforma diferente.'}</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(i => renderCard(i)).join('');
  applyLangToEl(grid);
}

// ── COPY ──
async function copyIdea(id, btnId, btnEl) {
  const idea = ideas.find(i => i.id === id);
  if (!idea) return;

  const text = idea.idea[currentLang] + '\n\n' + idea.hashtags[currentLang].join(' ');

  try {
    await navigator.clipboard.writeText(text);
    const originalHTML = btnEl.innerHTML;
    btnEl.classList.add('copied');
    btnEl.innerHTML = `✅ ${currentLang === 'en' ? 'Copied!' : '¡Copiado!'}`;
    setTimeout(() => {
      btnEl.classList.remove('copied');
      btnEl.innerHTML = originalHTML;
    }, 2000);
  } catch (e) {
    alert(currentLang === 'en' ? 'Copy failed. Please select and copy manually.' : 'Error al copiar. Selecciona y copia manualmente.');
  }
}

async function copyText(text, btnEl) {
  const decoded = text.replace(/\\'/g, "'").replace(/\\"/g, '"');
  try {
    await navigator.clipboard.writeText(decoded);
    const orig = btnEl.innerHTML;
    btnEl.style.background = 'var(--success)';
    btnEl.style.color = 'white';
    btnEl.style.borderColor = 'var(--success)';
    btnEl.innerHTML = '✅ ' + (currentLang === 'en' ? 'Copied!' : '¡Copiado!');
    setTimeout(() => {
      btnEl.style.background = '';
      btnEl.style.color = '';
      btnEl.style.borderColor = '';
      btnEl.innerHTML = orig;
    }, 2000);
  } catch (e) {}
}

// ── FAVORITES ──
function toggleFav(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem('cima-favs', JSON.stringify(favorites));
  updateFavCount();

  const card = document.getElementById(`card-${id}`);
  if (card) {
    const btn = card.querySelector('.btn-fav');
    if (btn) btn.textContent = favorites.includes(id) ? '⭐' : '☆';
  }
}

function updateFavCount() {
  document.getElementById('favCount').textContent = favorites.length;
}

function openFavorites() {
  const overlay = document.getElementById('favOverlay');
  const body = document.getElementById('favBody');

  if (favorites.length === 0) {
    body.innerHTML = `
      <div class="empty-favorites">
        <div class="emoji">☆</div>
        <p>${currentLang === 'en' ? 'No saved ideas yet. Tap ☆ on any card to save it!' : 'No hay ideas guardadas. ¡Toca ☆ en cualquier tarjeta para guardarla!'}</p>
      </div>`;
  } else {
    const favIdeas = ideas.filter(i => favorites.includes(i.id));
    body.innerHTML = favIdeas.map(i => renderCard(i, true)).join('');
    applyLangToEl(body);
  }

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeFavorites(e) {
  if (e && e.target !== document.getElementById('favOverlay')) return;
  document.getElementById('favOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── RANDOM / SPOTLIGHT ──
function openRandom() {
  const filtered = getFiltered();
  if (filtered.length === 0) return;
  const pick = filtered[Math.floor(Math.random() * filtered.length)];

  const body = document.getElementById('spotlightBody');
  body.innerHTML = renderCard(pick);
  applyLangToEl(body);

  document.getElementById('spotlightOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSpotlight(e) {
  if (e && e.target !== document.getElementById('spotlightOverlay')) return;
  document.getElementById('spotlightOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── SHUFFLE ──
function shuffleOrder() {
  const filtered = getFiltered();
  const ids = filtered.map(i => i.id).sort(() => Math.random() - 0.5);
  currentOrder = ids;
  renderCards();
}

// ── FILTERS ──
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  document.documentElement.lang = lang;
  applyLangToEl(document.body);
  renderCards();
}

function setPlatform(platform) {
  currentPlatform = platform;
  currentOrder = null;
  document.querySelectorAll('.platform-tab').forEach(t => {
    t.className = 'platform-tab';
    if (t.dataset.platform === platform) {
      if (platform === 'all') t.classList.add('active-all');
      else if (platform === 'instagram') t.classList.add('active-ig');
      else if (platform === 'facebook') t.classList.add('active-fb');
    }
  });
  renderCards();
}

function setCat(cat) {
  currentCat = cat;
  currentOrder = null;
  document.querySelectorAll('.cat-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.cat === cat);
  });
  renderCards();
}

// ── LANG TEXT UPDATE ──
function applyLangToEl(el) {
  el.querySelectorAll('[data-en]').forEach(el => {
    el.textContent = el.dataset[currentLang] || el.dataset.en;
  });
}

// ── INSTALL BANNER ──
function dismissInstall() {
  document.getElementById('installBanner').style.display = 'none';
  localStorage.setItem('cima-install-dismissed', '1');
}

function checkInstallBanner() {
  const dismissed = localStorage.getItem('cima-install-dismissed');
  const standalone = window.navigator.standalone;
  if (!dismissed && !standalone) {
    setTimeout(() => {
      document.getElementById('installBanner').style.display = 'flex';
    }, 3000);
  }
}

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  updateFavCount();
  renderCards();
  checkInstallBanner();
  applyLangToEl(document.body);
});
</script>
</body>
</html>
